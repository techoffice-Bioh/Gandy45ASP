<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gandy 45 — HMI flow simulation</title>
<link rel="icon" href="assets/sbsystem-favicon.png">
<style>
  :root {
    --bg: #0e151c; --surface: #161f29; --hover: #1f2c3a;
    --ink: #e6edf3; --ink-soft: #93a4b5; --line: #263340;
    --brand: #ff3b3b; --brand-tint: rgba(255, 59, 59, .14); --brand-edge: rgba(255, 59, 59, .38);
    --on: #0f9d58; --on-tint: rgba(15, 157, 88, .16); --on-edge: rgba(15, 157, 88, .4);
    --passive: #3fb4ff;
    --flow: #4d9bff;
    --paper: #0f1825; --paper-border: #243140;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg);
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    color: var(--ink); display: flex; align-items: center; justify-content: center; }
  #app { width: 1024px; height: 768px; background: var(--surface);
    display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid #263340; box-shadow: 0 10px 34px rgba(0,0,0,.5); }

  #reset { width: 100%; background: transparent; color: var(--brand);
    border: 1px solid var(--brand); border-radius: 7px; padding: 6px 10px;
    font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  #reset:hover { background: var(--brand); color: #fff; }

  #body { flex: 1 1 auto; display: flex; min-height: 0; }
  #canvas-wrap { flex: 1 1 auto; min-width: 0; position: relative; padding: 4px; }
  #graph { position: relative; width: 100%; height: 100%; background: var(--paper);
    border: 1px solid var(--paper-border); border-radius: 8px; overflow: auto;
    user-select: none; outline: none; touch-action: pan-x pan-y; }

  #zoomctl { position: absolute; right: 14px; bottom: 14px; z-index: 6;
    display: flex; flex-direction: column; background: var(--surface);
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,.25); }
  #zoomctl button { width: 34px; height: 32px; border: none; background: transparent;
    color: var(--ink); font: inherit; font-size: 16px; line-height: 1; font-weight: 600;
    cursor: pointer; border-bottom: 1px solid var(--line); }
  #zoomctl button:last-child { border-bottom: none; font-size: 13px; }
  #zoomctl button:hover { background: var(--hover); }

  @media (max-width: 760px) {
    #body { flex-direction: column; }
    #canvas-wrap { min-height: 0; }
    #panel { flex: 0 0 34vh; width: 100%; height: 34vh; max-height: 34vh;
      border-left: none; border-top: 1px solid var(--line); }
  }

  /* Panel is a fixed-size sidebar, never user-resizable: on desktop a fixed
     width, on mobile a fixed height (see media query above). This exists so
     the canvas on the left always gets a stable box to fit the diagram into
     -- if the panel could grow/shrink, the graph's fit-to-view zoom would
     shift with it and the diagram could end up clipped, especially on phones. */
  #panel { flex: 0 0 340px; width: 340px; background: var(--surface);
    border-left: 1px solid var(--line); display: flex; flex-direction: column;
    padding: 6px; gap: 6px; min-width: 0; resize: none; overflow: hidden; }
  #list { flex: 1 1 auto; display: grid;
    grid-template-columns: 1fr 1fr; grid-auto-rows: 60px; gap: 6px;
    overflow-y: auto; overflow-x: hidden; min-width: 0; resize: none; }
  .sw { display: flex; align-items: center; gap: 6px; width: 100%; min-width: 0;
    text-align: left; background: transparent; border: 1px solid transparent;
    border-radius: 7px; padding: 6px 8px; cursor: pointer; font: inherit;
    font-size: 11px; line-height: 1.2; color: var(--ink-soft); }
  .sw .bolt { flex: 0 0 auto; font-size: 12px; filter: grayscale(1); opacity: .45; }
  .sw .nm { flex: 1 1 auto; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; white-space: normal; }
  .sw-toggle { flex: 0 0 auto; margin-left: auto; width: 26px; height: 14px;
    border-radius: 999px; background: #3a4a5a; position: relative; }
  .sw-toggle::after { content: ""; position: absolute; top: 2px; left: 2px;
    width: 10px; height: 10px; border-radius: 50%; background: #e6edf3;
    box-shadow: 0 1px 2px rgba(0,0,0,.5); transition: left .12s ease; }
  .sw.on { background: var(--on-tint); border-color: var(--on-edge);
    color: var(--ink); font-weight: 600; }
  .sw.on .bolt { filter: none; opacity: 1; }
  .sw.on .sw-toggle { background: var(--on); }
  .sw.on .sw-toggle::after { left: 14px; }
  .sw.attn { animation: attnbg 1s ease-in-out infinite; }
  @keyframes attnbg { 50% { background: #3d331a; border-color: #c9a227; } }
  .legendbar { flex: 0 0 auto; border-top: 1px solid var(--line);
    padding-top: 6px; font-size: 10px; color: var(--ink-soft);
    display: flex; flex-direction: column; gap: 3px; }
  .legendbar .row { display: flex; align-items: center; gap: 7px; }
  .keyline { width: 26px; height: 0; border-top: 3px solid #3a4a5a; }
  .keyline.press { border-top-color: var(--flow); }
  .keyline.flow { border-top: 3px dashed var(--flow); }

  /* diagram decorations */
  .comp-glow { filter: drop-shadow(0 0 5px rgba(15,157,88,.85)); }
  .conn-press { }
  .conn-flow-f { stroke-dasharray: 7 5; animation: flowdash .5s linear infinite; }
  .conn-flow-r { stroke-dasharray: 7 5; animation: flowdash .5s linear infinite reverse; }
  @keyframes flowdash { to { stroke-dashoffset: -12; } }

  /* overlays over embedded icons */
  .ov { position: absolute; z-index: 5; border-radius: 3px;
    border: 1px solid transparent; }
  .ov.clickable { cursor: pointer; }
  .ov.ev.off { background: #3a4652; }
  .ov.ev.on { background: var(--on); border-color: var(--on);
    box-shadow: 0 0 6px rgba(15,157,88,.8); }
  .ov.ev.passive { background: var(--passive); border-color: var(--passive); }
  .ov.dot { border-radius: 50%; }
  .ov.dot.off { background: #3a4652; }
  .ov.dot.on { background: var(--on); border-color: var(--on);
    box-shadow: 0 0 6px rgba(15,157,88,.8); }
  .ov.dot.passive { background: var(--passive); border-color: var(--passive); }
  .ov.attn { animation: attnov 1s ease-in-out infinite; }
  @keyframes attnov {
    0%, 100% { border-color: transparent; box-shadow: none; }
    50% { border-color: #f4b400; box-shadow: 0 0 8px 2px rgba(244,180,0,.85);
          background: rgba(244,180,0,.22); } }
  #graph svg { filter: invert(1) hue-rotate(180deg); }
</style>

<script>
(function () {
"use strict";
function boot() {
  var graphDiv = document.getElementById("graph");
  if (typeof mxGraph === "undefined") {
    graphDiv.textContent = "Failed to load vendor/mxgraph/mxClient.js";
    return;
  }
  var DATA = JSON.parse(document.getElementById("simdata").textContent);
  var xml = document.getElementById("diagram").textContent;
  var graph = new mxGraph(graphDiv);
  graph.setEnabled(false); graph.setTooltips(false); graph.setPanning(false);
  graph.setConnectable(false); graph.setCellsLocked(true);
  graph.setCellsSelectable(false); graph.setCellsEditable(false);
  graph.foldingEnabled = false; graph.setHtmlLabels(true);
  var sheet = graph.getStylesheet();
  var invisible = {};
  invisible[mxConstants.STYLE_FILLCOLOR] = "none";
  invisible[mxConstants.STYLE_STROKECOLOR] = "none";
  sheet.putCellStyle("group", invisible);
  sheet.putCellStyle("edgeLabel", invisible);
  var codec = new mxCodec(mxUtils.parseXml(xml));
  codec.decode(mxUtils.parseXml(xml).documentElement, graph.getModel());
  var model = graph.getModel();
  var cells = model.cells;

  // ---------------- simulation state ----------------
  var SW = {};                       // switch id -> bool
  DATA.switches.forEach(function (s) { SW[s.sw] = false; });
  var cosmetic = {};                 // drawio group id -> clicked "on" (passive comps)
  var manifoldActive = false;

  var E = DATA.edges;                // {a,b,comp}
  var comps = DATA.comps;

  function compOpen(cid) {
    var c = comps[cid];
    if (c.type === "valve") return !!SW[c.sw];
    return true;
  }
  // allowed directions for edge i given state: {ab, ba}
  function edgeDirs(i) {
    var e = E[i];
    if (!e.comp) return { ab: true, ba: true };
    var c = comps[e.comp];
    if (c.type === "conduit") return { ab: true, ba: true };
    if (c.type === "valve") {
      var o = !!SW[c.sw];
      return { ab: o, ba: o };
    }
    if (c.type === "check") {
      if (e.a === c["in"]) return { ab: true, ba: false };
      if (e.a === c["out"]) return { ab: false, ba: true };
      throw new Error("check valve " + e.comp + ": port " + e.a + " is neither in nor out");
    }
    if (c.type === "pump") {
      var on = !!SW[c.sw];
      if (!on) return c.passWhenOff ? { ab: true, ba: true } : { ab: false, ba: false };
      if (e.a === c["in"]) return { ab: true, ba: false };
      if (e.a === c["out"]) return { ab: false, ba: true };
      throw new Error("pump " + e.comp + ": port " + e.a + " is neither in nor out");
    }
    return { ab: false, ba: false };
  }

  function buildAdj() {
    var adj = {}, radj = {};
    function add(map, u, v, idx, dir) {
      (map[u] = map[u] || []).push({ to: v, idx: idx, dir: dir });
    }
    for (var i = 0; i < E.length; i++) {
      var d = edgeDirs(i), e = E[i];
      if (d.ab) { add(adj, e.a, e.b, i, "ab"); add(radj, e.b, e.a, i, "ab"); }
      if (d.ba) { add(adj, e.b, e.a, i, "ba"); add(radj, e.a, e.b, i, "ba"); }
    }
    return { adj: adj, radj: radj };
  }

  function bfs(starts, adjmap) {
    var seen = {}, prev = {}, q = [];
    starts.forEach(function (s) { if (!seen[s]) { seen[s] = true; q.push(s); } });
    for (var h = 0; h < q.length; h++) {
      var u = q[h], ns = adjmap[u] || [];
      for (var i = 0; i < ns.length; i++) {
        var v = ns[i].to;
        if (!seen[v]) { seen[v] = true; prev[v] = { from: u, idx: ns[i].idx }; q.push(v); }
      }
    }
    return { seen: seen, prev: prev };
  }

  // all simple paths start -> any sink; mark directed edges on found paths
  function markPaths(start, sinkSet, adj, flowDir) {
    var visited = {}; visited[start] = true;
    var stack = []; var found = false; var steps = 0;
    (function rec(u) {
      if (steps++ > 300000) return;
      var ns = adj[u] || [];
      for (var i = 0; i < ns.length; i++) {
        var v = ns[i].to;
        if (sinkSet[v]) {
          found = true;
          for (var k = 0; k < stack.length; k++) {
            if (!(stack[k].idx in flowDir)) flowDir[stack[k].idx] = stack[k].dirAB;
          }
          if (!(ns[i].idx in flowDir))
            flowDir[ns[i].idx] = (ns[i].dir === "ab");
          continue;
        }
        if (visited[v]) continue;
        visited[v] = true;
        stack.push({ idx: ns[i].idx, dirAB: (ns[i].dir === "ab") });
        rec(v);
        stack.pop();
        visited[v] = false;
      }
    })(start);
    return found;
  }

  function simulate() {
    var g = buildAdj();
    var pressN = {};                 // pressurized nodes
    var flowDir = {};                // edge idx -> flows a->b (true) / b->a (false)
    var sinkSet = {};
    DATA.sinks.forEach(function (s) { sinkSet[s] = true; });

    // mains pressure
    var r = bfs(DATA.pressureSources, g.adj);
    for (var n in r.seen) pressN[n] = true;
    DATA.pressureSources.forEach(function (s) {
      markPaths(s, sinkSet, g.adj, flowDir);
    });

    // pumps drawing from a reservoir (or boosted mains)
    var resSet = {};
    DATA.reservoirs.forEach(function (x) { resSet[x] = true; });
    for (var cid in comps) {
      var c = comps[cid];
      if (c.type !== "pump" || !SW[c.sw]) continue;
      var back = bfs([c["in"]], g.radj);
      var src = null;
      for (var b in back.seen) {
        if (resSet[b] || DATA.pressureSources.indexOf(b) >= 0) { src = b; break; }
      }
      if (!src) continue;                        // pump runs dry: no effect
      // intake path src -> pump inlet
      var fwd = bfs([src], g.adj);
      var intake = [];
      if (fwd.seen[c["in"]]) {
        var u = c["in"];
        while (u !== src && fwd.prev[u]) {
          intake.push(fwd.prev[u].idx);
          pressN[u] = true;
          u = fwd.prev[u].from;
        }
        pressN[src] = true;
      }
      // delivery side pressurized
      var out = bfs([c["out"]], g.adj);
      for (var n2 in out.seen) pressN[n2] = true;
      // flow only if the delivery side reaches a sink
      var delivered = markPaths(c["out"], sinkSet, g.adj, flowDir);
      if (delivered) {
        intake.forEach(function (idx) {
          if (!(idx in flowDir)) {
            // direction: toward the pump = along the bfs tree from src
            var e = E[idx];
            // fwd tree stored parent links; orientation resolved via prev walk:
            flowDir[idx] = null;     // fill below
          }
        });
        // orient intake edges by rewalking the path
        var u2 = c["in"], guard = 0;
        while (u2 !== src && fwd.prev[u2] && guard++ < 10000) {
          var pr = fwd.prev[u2], e2 = E[pr.idx];
          if (flowDir[pr.idx] === null || !(pr.idx in flowDir))
            flowDir[pr.idx] = (e2.a === pr.from);
          u2 = pr.from;
        }
      }
    }

    // pressurized edges: both ends pressurized and open in some direction
    var pressE = {};
    for (var i = 0; i < E.length; i++) {
      if (i in flowDir) continue;
      var d = edgeDirs(i);
      if (!d.ab && !d.ba) continue;
      var e3 = E[i];
      if ((d.ab && pressN[e3.a]) || (d.ba && pressN[e3.b])) {
        if (pressN[e3.a] || pressN[e3.b]) pressE[i] = true;
      }
    }
    return { pressN: pressN, pressE: pressE, flowDir: flowDir };
  }

  // ---------------- visuals ----------------
  var OP_ON = "100", OP_OFF = "25";

  function descendVertices(cell, acc) {
    acc.push(cell);
    for (var i = 0; i < model.getChildCount(cell); i++) {
      var ch = model.getChildAt(cell, i);
      if (model.isVertex(ch)) descendVertices(ch, acc);
    }
  }
  var groupCells = {};    // top group id -> descendant vertices
  for (var cid0 in DATA.visual) {
    var gid = DATA.visual[cid0];
    if (cells[gid]) { var acc = []; descendVertices(cells[gid], acc); groupCells[gid] = acc; }
  }

  function edgeLine(cell) {
    var st = graph.view.getState(cell);
    if (!st || !st.shape || !st.shape.node) return null;
    var paths = st.shape.node.getElementsByTagName("path");
    for (var i = 0; i < paths.length; i++) {
      if (paths[i].getAttribute("visibility") !== "hidden") return paths[i];
    }
    return null;
  }

  var sim = { pressN: {}, pressE: {}, flowDir: {} };

  var nativeStroke = {};   // tube -> its own drawio strokeColor, cached once
  function tubeColor(tube, cell) {
    if (!(tube in nativeStroke)) {
      var m = /strokeColor=(#[0-9A-Fa-f]{6})/.exec(cell.getStyle() || "");
      nativeStroke[tube] = m ? m[1] : "#1565d8";
    }
    return nativeStroke[tube];
  }

  function applyEdges() {
    for (var cellId in DATA.tubes) {
      var t = DATA.tubes[cellId];
      var cell = cells[t.cellId];
      if (!cell) continue;
      var st = graph.view.getState(cell);
      if (!st || !st.shape || !st.shape.node) continue;
      var node = st.shape.node;
      var line = edgeLine(cell);
      if (line) line.classList.remove("conn-flow-f", "conn-flow-r");
      var flowing = (t.edge in sim.flowDir);
      var pressed = sim.pressE[t.edge] && !t.inTank;
      if (!line || !node) continue;
      var color = tubeColor(cellId, cell);
      if (flowing) {
        node.style.opacity = "1";
        line.style.stroke = color;
        line.style.strokeWidth = "3.4px";
        node.style.filter = "drop-shadow(0 0 4px " + color + ")";
        var dirAB = sim.flowDir[t.edge];
        var fwd = (dirAB === t.drawSrcIsA);
        line.classList.add(fwd ? "conn-flow-f" : "conn-flow-r");
      } else if (pressed) {
        node.style.opacity = "1";
        line.style.stroke = color;
        line.style.strokeWidth = "2.6px";
        node.style.filter = "";
      } else {
        node.style.opacity = "0.18";
        line.style.stroke = "";
        line.style.strokeWidth = "";
        node.style.filter = "";
      }
    }
  }

  function compWetted(compId) {
    var nodes = DATA.compNodes[compId] || [];
    for (var i = 0; i < nodes.length; i++) if (sim.pressN[nodes[i]]) return true;
    return false;
  }

  function glowGroups() {
    var out = {};
    for (var sw in DATA.switchVisual) {
      if (SW[sw]) out[DATA.switchVisual[sw]] = true;
    }
    if (manifoldActive) out["flow_manifold_group"] = true;
    return out;
  }

  // "on" = commanded by its switch; "passive" = not commanded but wetted (e.g.
  // main pump off with free-flow through it, passWhenOff); else "idle".
  function compState(sw, comp) {
    if (SW[sw]) return "on";
    if (compWetted(comp)) return "passive";
    return "idle";
  }

  function applyComponents() {
    var bright = [], dim = [];
    var glows = glowGroups();
    for (var compId in DATA.visual) {
      var gid = DATA.visual[compId];
      var isOn = compWetted(compId) || glows[gid] || cosmetic[gid];
      (isOn ? bright : dim).push.apply(isOn ? bright : dim, groupCells[gid] || []);
    }
    model.beginUpdate();
    try {
      if (bright.length) graph.setCellStyles(mxConstants.STYLE_OPACITY, OP_ON, bright);
      if (dim.length) graph.setCellStyles(mxConstants.STYLE_OPACITY, OP_OFF, dim);
    } finally { model.endUpdate(); }
    for (var compId2 in DATA.visual) {
      var gid2 = DATA.visual[compId2];
      var st = graph.view.getState(cells[gid2]);
      var on = !!glows[gid2];
      (groupCells[gid2] || []).forEach(function (c) {
        var s2 = graph.view.getState(c);
        if (s2 && s2.shape && s2.shape.node) {
          s2.shape.node.classList.toggle("comp-glow", on);
        }
      });
    }
  }

  // ---------------- overlays ----------------
  var ovEls = {};
  DATA.overlays.forEach(function (ov) {
    var el = document.createElement("div");
    el.className = "ov " + ov.kind;
    el.title = ov.label;
    if (ov.sw) {
      el.classList.add("clickable");
      el.addEventListener("click", function () {
        SW[ov.sw] = !SW[ov.sw];
        recompute();
      });
    }
    graphDiv.appendChild(el);
    ovEls[ov.id] = el;
  });

  function placeOverlays() {
    DATA.overlays.forEach(function (ov) {
      var el = ovEls[ov.id];
      var st = graph.view.getState(cells[ov.host]);
      if (!st) { el.style.display = "none"; return; }
      el.style.display = "";
      var pad = ov.kind === "dot" ? 3 : 0;
      el.style.left = (st.x + ov.rx * st.width - pad) + "px";
      el.style.top = (st.y + ov.ry * st.height - pad) + "px";
      el.style.width = (ov.rw * st.width + 2 * pad) + "px";
      el.style.height = (ov.rh * st.height + 2 * pad) + "px";
    });
  }

  function styleOverlays() {
    DATA.overlays.forEach(function (ov) {
      var el = ovEls[ov.id];
      var state = ov.comp ? compState(ov.sw, ov.comp) : (SW[ov.sw] ? "on" : "idle");
      el.classList.toggle("on", state === "on");
      el.classList.toggle("passive", state === "passive");
      el.classList.toggle("off", state === "idle");
      el.classList.toggle("switched", !!SW[ov.sw]);
      var attn = state !== "on" && ov.host === "flow_manifold" && manifoldActive;
      el.classList.toggle("attn", attn);
    });
  }

  // ---------------- panel ----------------
  var listEl = document.getElementById("list");
  var rows = {};
  DATA.switches.forEach(function (s) {
    var btn = document.createElement("button");
    btn.type = "button"; btn.className = "sw";
    btn.innerHTML = '<span class="bolt">&#9889;</span><span class="nm"></span>' +
      '<span class="sw-toggle"></span>';
    btn.querySelector(".nm").textContent = s.label;
    btn.addEventListener("click", function () {
      SW[s.sw] = !SW[s.sw];
      recompute();
    });
    listEl.appendChild(btn);
    rows[s.sw] = btn;
  });
  function syncPanel() {
    DATA.switches.forEach(function (s) {
      rows[s.sw].classList.toggle("on", !!SW[s.sw]);
      var attn = manifoldActive && !SW[s.sw] &&
        (s.sw === "sw_ev_load_water" || s.sw === "sw_ev_recirculation" ||
         s.sw === "sw_ev_unload");
      rows[s.sw].classList.toggle("attn", attn);
    });
  }

  // ---------------- viewport: geometry-based framing + zoom ----------------
  // graph.fit() frames from the RENDERED bounds, which mxGraph inflates with
  // the HTML label boxes, so the diagram ends up off-centre inside a pane far
  // taller than the real content. Frame from GEOMETRY instead (immune to
  // labels), compute scale + centred translate ourselves, and clamp the pane
  // to max(viewport, content) so scrollbars appear only when zoomed past fit.
  var PAD = 14;
  var fitScale = 1;                  // scale at which the whole diagram fits

  function contentBBox() {
    var layer = model.getChildAt(model.getRoot(), 0);
    return graph.getBoundingBoxFromGeometry(model.getChildCells(layer, true, true), true);
  }

  // anchor (optional) = { mx, my, sx, sy }: after rescaling, keep the model
  // point (mx,my) under the container-relative screen point (sx,sy). Without
  // an anchor the view is recentred (used by the buttons and fit).
  function applyScale(s, anchor, bb) {
    bb = bb || contentBBox();
    if (!bb || !bb.width || !bb.height) return;
    var cw = graphDiv.clientWidth, ch = graphDiv.clientHeight;
    s = Math.max(fitScale, Math.min(s, Math.max(fitScale * 4, 2)));
    var paneW = Math.max(cw, Math.ceil(bb.width * s + 2 * PAD));
    var paneH = Math.max(ch, Math.ceil(bb.height * s + 2 * PAD));
    var tx = (paneW / s - bb.width) / 2 - bb.x;   // centre content in the pane
    var ty = (paneH / s - bb.height) / 2 - bb.y;
    graph.view.scaleAndTranslate(s, tx, ty);
    var svg = graphDiv.querySelector("svg");
    if (svg) { svg.style.minWidth = paneW + "px"; svg.style.minHeight = paneH + "px"; }
    if (anchor) {                                 // keep the pinched point put
      graphDiv.scrollLeft = (anchor.mx + tx) * s - anchor.sx;
      graphDiv.scrollTop = (anchor.my + ty) * s - anchor.sy;
    } else {                                      // recentre
      graphDiv.scrollLeft = (graphDiv.scrollWidth - cw) / 2;
      graphDiv.scrollTop = (graphDiv.scrollHeight - ch) / 2;
    }
    refreshDecor();
  }

  function fitView() {
    var bb = contentBBox();
    if (!bb || !bb.width || !bb.height) return;
    var cw = graphDiv.clientWidth, ch = graphDiv.clientHeight;
    fitScale = Math.min((cw - 2 * PAD) / bb.width, (ch - 2 * PAD) / bb.height, 1.6);
    applyScale(fitScale, null, bb);
  }

  document.getElementById("zoomctl").addEventListener("click", function (e) {
    var z = e.target.getAttribute("data-z");
    if (z === "in") applyScale(graph.view.scale * 1.25);
    else if (z === "out") applyScale(graph.view.scale / 1.25);
    else if (z === "fit") fitView();
  });

  // ---------------- touch gestures ----------------
  // one-finger pan is native (overflow:auto); two-finger pinch zooms the
  // diagram, anchored on the midpoint between the fingers. touch-action:
  // pan-x pan-y (CSS) keeps native one-finger scroll while letting us own
  // the pinch (we preventDefault only for 2-finger moves).
  var pinch = null;
  function touchDist(a, b) {
    var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  graphDiv.addEventListener("touchstart", function (e) {
    if (e.touches.length !== 2) return;
    var r = graphDiv.getBoundingClientRect();
    var sx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    var sy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    var s0 = graph.view.scale, t = graph.view.translate;
    pinch = { d0: touchDist(e.touches[0], e.touches[1]), s0: s0,
              mx: (graphDiv.scrollLeft + sx) / s0 - t.x,
              my: (graphDiv.scrollTop + sy) / s0 - t.y };
    e.preventDefault();
  }, { passive: false });
  graphDiv.addEventListener("touchmove", function (e) {
    if (!pinch || e.touches.length !== 2) return;
    var r = graphDiv.getBoundingClientRect();
    var sx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    var sy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    var d = touchDist(e.touches[0], e.touches[1]);
    if (pinch.d0 > 0) {
      applyScale(pinch.s0 * (d / pinch.d0), { mx: pinch.mx, my: pinch.my, sx: sx, sy: sy });
    }
    e.preventDefault();
  }, { passive: false });
  graphDiv.addEventListener("touchend", function (e) {
    if (e.touches.length < 2) pinch = null;
  });

  // re-frame whenever the canvas box actually changes size (rotation, mobile
  // reflow, virtual keyboard). ResizeObserver on #canvas-wrap catches this
  // directly -- the panel itself is fixed-size (CSS) and never triggers it.
  var refitPending = false;
  function requestRefit() {
    if (refitPending) return;
    refitPending = true;
    window.requestAnimationFrame(function () { refitPending = false; fitView(); });
  }
  window.addEventListener("resize", requestRefit);
  if (typeof ResizeObserver !== "undefined") {
    new ResizeObserver(requestRefit).observe(document.getElementById("canvas-wrap"));
  }

  // ---------------- main loop ----------------
  function refreshDecor() {
    applyComponents();
    applyEdges();
    placeOverlays();
    styleOverlays();
  }
  function recompute() {
    sim = simulate();
    refreshDecor();
    syncPanel();
  }
  document.getElementById("reset").addEventListener("click", function () {
    for (var k in SW) SW[k] = false;
    cosmetic = {};
    manifoldActive = false;
    recompute();
  });

  fitView();
  recompute();
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else { boot(); }
})();
</script>
</body>
</html>
